! =====================================================
! ROUTER : RTR-3-AS200-DC3
! ROLE   : Data Center 2 Edge Router
! AS     : 200
! PROJECT: BGP Data Center Interconnection
! =====================================================

hostname RTR-3-AS200-DC3

! =====================================================
! CDP CONFIGURATION
! =====================================================

cdp run

! =====================================================
! LOOPBACK INTERFACES
! =====================================================

interface Loopback0
 description ROUTER-ID
 ip address 2.2.2.3 255.255.255.255

interface Loopback10
 description PREFIX-BGP
 ip address 20.20.20.3 255.255.255.255

! =====================================================
! PHYSICAL INTERFACES
! =====================================================

interface Ethernet0/0
 description Link-to-RTR-2-AS200-DC2-Ethernet0/1
 cdp enable
 ip address 192.168.200.6 255.255.255.252
 ip ospf network point-to-point
 no shutdown

interface Ethernet0/1
 description Link-to-RTR-AS300-DC3-Ethernet0/0
 cdp enable
 ip address 209.255.255.250 255.255.255.252
 no shutdown

! =====================================================
! OSPF CONFIGURATION
! =====================================================

router ospf 1

 router-id 2.2.2.3

 network 2.2.2.3 0.0.0.0 area 0
 network 192.168.200.4 0.0.0.3 area 0

! =====================================================
! iBGP CONFIGURATION
! =====================================================

router bgp 200

 bgp router-id 2.2.2.3

 neighbor 2.2.2.2 remote-as 200
 neighbor 2.2.2.2 description iBGP-to-RTR-2-AS200-DC2
 neighbor 2.2.2.2 update-source Loopback0

 address-family ipv4

  network 20.20.20.3 mask 255.255.255.255

  neighbor 2.2.2.2 activate
  neighbor 2.2.2.2 soft-reconfiguration inbound
  neighbor 2.2.2.2 next-hop-self

 exit-address-family

! =====================================================
! eBGP CONFIGURATION
! =====================================================

router bgp 200

 neighbor 209.255.255.249 remote-as 300
 neighbor 209.255.255.249 description eBGP-to-AS300

 address-family ipv4

  neighbor 209.255.255.249 activate
  neighbor 209.255.255.249 soft-reconfiguration inbound

 exit-address-family

! =====================================================
! VERIFICATION COMMANDS
! =====================================================
!
! show ip ospf neighbor
! show ip bgp summary
! show ip bgp
! show ip route
! ping 2.2.2.2
! ping 209.255.255.249
!
! =====================================================
! END OF CONFIGURATION
! =====================================================