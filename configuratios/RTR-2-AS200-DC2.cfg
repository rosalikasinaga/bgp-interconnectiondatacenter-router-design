! =====================================================
! ROUTER : RTR-2-AS200-DC2
! ROLE   : Data Center 2 Core Router
! AS     : 200
! PROJECT: BGP Interconnection Data Center on EVE-NG
! =====================================================

hostname RTR-2-AS200-DC2

! =====================================================
! CDP CONFIGURATION
! =====================================================

cdp run

! =====================================================
! LOOPBACK INTERFACES
! =====================================================

interface Loopback0
 description ROUTER-ID
 ip address 2.2.2.2 255.255.255.255

interface Loopback10
 description PREFIX-BGP
 ip address 20.20.20.2 255.255.255.255

! =====================================================
! PHYSICAL INTERFACES
! =====================================================

interface Ethernet0/0
 description Link-to-RTR-1-AS200-DC2-Ethernet1/1
 cdp enable
 ip address 192.168.200.2 255.255.255.252
 ip ospf network point-to-point
 no shutdown

interface Ethernet0/1
 description Link-to-RTR-3-AS200-DC2-Ethernet0/0
 cdp enable
 ip address 192.168.200.5 255.255.255.252
 ip ospf network point-to-point
 no shutdown

! =====================================================
! OSPF CONFIGURATION
! =====================================================

router ospf 1

 router-id 2.2.2.2

 network 2.2.2.2 0.0.0.0 area 0
 network 192.168.200.0 0.0.0.3 area 0
 network 192.168.200.4 0.0.0.3 area 0

! =====================================================
! iBGP CONFIGURATION
! =====================================================

router bgp 200

 bgp router-id 2.2.2.2

 neighbor 2.2.2.1 remote-as 200
 neighbor 2.2.2.1 description iBGP-to-RTR-1-AS200-DC2
 neighbor 2.2.2.1 update-source Loopback0

 neighbor 2.2.2.3 remote-as 200
 neighbor 2.2.2.3 description iBGP-to-RTR-3-AS200-DC2
 neighbor 2.2.2.3 update-source Loopback0

 address-family ipv4

  network 20.20.20.2 mask 255.255.255.255

  neighbor 2.2.2.1 activate
  neighbor 2.2.2.1 soft-reconfiguration inbound

  neighbor 2.2.2.3 activate
  neighbor 2.2.2.3 soft-reconfiguration inbound

 exit-address-family

! =====================================================
! VERIFICATION COMMANDS
! =====================================================
!
! show ip ospf neighbor
! show ip bgp summary
! show ip bgp
! show ip route
! ping 2.2.2.1
! ping 2.2.2.3
!
! =====================================================
! END OF CONFIGURATION
! =====================================================