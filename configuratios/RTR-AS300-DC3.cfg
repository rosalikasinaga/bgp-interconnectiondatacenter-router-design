! =====================================================
! ROUTER : RTR-AS300-DC3
! ROLE   : Data Center 3 Edge Router
! AS     : 300
! PROJECT: BGP Interconnection Data Center on EVE-NG
! =====================================================

hostname RTR-AS300-DC3

! =====================================================
! CDP CONFIGURATION
! =====================================================

cdp run

! =====================================================
! LOOPBACK INTERFACES
! =====================================================

interface Loopback0
 description ROUTER-ID
 ip address 2.2.2.30 255.255.255.255

interface Loopback10
 description PREFIX-BGP
 ip address 20.20.20.30 255.255.255.255

! =====================================================
! PHYSICAL INTERFACES
! =====================================================

interface Ethernet0/0
 description Link-to-RTR-3-AS200-DC3-Ethernet0/1
 cdp enable
 ip address 209.255.255.249 255.255.255.252
 no shutdown

! =====================================================
! eBGP CONFIGURATION
! =====================================================

router bgp 300

 bgp router-id 2.2.2.30

 neighbor 209.255.255.250 remote-as 200
 neighbor 209.255.255.250 description eBGP-to-AS200

 address-family ipv4

  network 20.20.20.30 mask 255.255.255.255

  neighbor 209.255.255.250 activate

 exit-address-family

! =====================================================
! VERIFICATION COMMANDS
! =====================================================
!
! show ip bgp summary
! show ip bgp
! show ip route
! ping 209.255.255.250
!
! =====================================================
! END OF CONFIGURATION
! =====================================================