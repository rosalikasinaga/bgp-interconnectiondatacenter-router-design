! =====================================================
! ROUTER : RTR-AS100-DC1
! ROLE   : Data Center 1 Edge Router
! AS     : 100
! PROJECT: BGP Interconnection Data Center on EVE-NG
! =====================================================

hostname RTR-AS100-DC1

! =====================================================
! CDP CONFIGURATION
! =====================================================

cdp run

! =====================================================
! LOOPBACK INTERFACES
! =====================================================

interface Loopback0
 description ROUTER-ID
 ip address 2.2.2.10 255.255.255.255

interface Loopback10
 description PREFIX-BGP
 ip address 20.20.20.10 255.255.255.255

! =====================================================
! PHYSICAL INTERFACES
! =====================================================

interface Ethernet0/0
 description Link-to-RTR01-Ethernet0/0
 cdp enable
 ip address 209.255.255.253 255.255.255.252
 no shutdown

! =====================================================
! BGP CONFIGURATION
! =====================================================

router bgp 100

 bgp router-id 2.2.2.10

 neighbor 209.255.255.254 remote-as 200
 neighbor 209.255.255.254 description eBGP-to-AS200

 address-family ipv4

  network 20.20.20.10 mask 255.255.255.255

  neighbor 209.255.255.254 activate
  neighbor 209.255.255.254 soft-reconfiguration inbound

 exit-address-family

! =====================================================
! VERIFICATION COMMANDS
! =====================================================
!
! show ip bgp summary
! show ip bgp
! show ip route
! ping 209.255.255.254
!
! =====================================================
! END OF CONFIGURATION
! =====================================================